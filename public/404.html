<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Página no encontrada - Jose Antonio Arias Lombardero</title>
    
    <link rel="icon" type="image/jpeg" href="/favicon-cuadrado.jpeg" />
    <link rel="apple-touch-icon" href="/favicon-cuadrado.jpeg" />
    <link rel="manifest" href="/site.webmanifest" />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style type="text/tailwindcss">
        :root {
            --primary: #ff3333;
            --bg-dark: #0a0a0a;
            --text-main: #f3f4f6;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="antialiased selection:bg-red-500/30 min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Background effects -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-red-900/10 rounded-full blur-3xl mix-blend-screen"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-blue-900/10 rounded-full blur-3xl mix-blend-screen"></div>
    </div>

    <div class="relative z-10 glass-card p-12 rounded-3xl text-center max-w-lg mx-4">
        <h1 class="text-8xl font-bold font-display text-[var(--primary)] mb-4">404</h1>
        <h2 class="text-2xl font-bold font-display text-slate-50 mb-4">Página no encontrada</h2>
        <p class="text-slate-400 mb-8">Parece que te has perdido. La página que buscas no existe o ha sido movida.</p>
        <a href="/" class="inline-flex items-center gap-2 px-8 py-3 bg-[var(--primary)] hover:bg-red-600 text-slate-200 rounded-full font-medium transition-all duration-300 shadow-[0_0_20px_rgba(255,51,51,0.3)]">
            Volver al inicio
        </a>
    </div>
</body>
</html>
